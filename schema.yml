    Mob:
      type: object
      properties:
        token:
          $ref: '#/components/schemas/Token'
      required:
      - token
    Moles:
      type: object
      description: Serializer to provide all (public) information about moles
      properties:
        player:
          $ref: '#/components/schemas/PlayerPublic'
        warriors:
          type: array
          items:
            $ref: '#/components/schemas/Warrior'
        buildings:
          $ref: '#/components/schemas/MolesBuildings'
        tokens:
          $ref: '#/components/schemas/MolesTokens'
        ministers:
          type: array
          items:
            $ref: '#/components/schemas/MolesMinister'
        crowns:
          type: array
          items:
            $ref: '#/components/schemas/MolesCrown'
        burrow_warriors:
          type: string
          readOnly: true
      required:
      - buildings
      - burrow_warriors
      - crowns
      - ministers
      - player
      - tokens
      - warriors
    MolesBuildings:
      type: object
      description: Serializer for moles buildings. collects lists of all buildings
      properties:
        citadels:
          type: array
          items:
            $ref: '#/components/schemas/MolesCitadel'
        markets:
          type: array
          items:
            $ref: '#/components/schemas/MolesMarket'
      required:
      - citadels
      - markets
    MolesCitadel:
      type: object
      properties:
        building:
          $ref: '#/components/schemas/Building'
        crafted_with:
          type: boolean
      required:
      - building
    MolesCrown:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/TypeEnum'
        used:
          type: boolean
    MolesMarket:
      type: object
      properties:
        building:
          $ref: '#/components/schemas/Building'
        crafted_with:
          type: boolean
      required:
      - building
    MolesMinister:
      type: object
      properties:
        name:
          type: string
          readOnly: true
        swayed:
          type: boolean
        used:
          type: boolean
        crown_type:
          type: string
          description: Returns the crown type (rank) for this minister.
          readOnly: true
      required:
      - crown_type
      - name
    MolesNestedToken:
      type: object
      properties:
        token:
          $ref: '#/components/schemas/Token'
      required:
      - token
    MolesTokens:
      type: object
      description: Serializer for moles tokens. collects lists of all tokens
      properties:
        tunnels:
          type: array
          items:
            $ref: '#/components/schemas/MolesNestedToken'
      required:
      - tunnels
    MoodTypeEnum:
      enum:
      - bitter
      - grandiose
      - jubilant
      - lavish
      - relentless
      - rowdy
      - stubborn
      - wrathful
      type: string
      description: |-
        * `bitter` - Bitter
        * `grandiose` - Grandiose
        * `jubilant` - Jubilant
        * `lavish` - Lavish
        * `relentless` - Relentless
        * `rowdy` - Rowdy
        * `stubborn` - Stubborn
        * `wrathful` - Wrathful
    NestedToken:
      type: object
      properties:
        token:
          $ref: '#/components/schemas/Token'
      required:
      - token
    Option:
      type: object
      properties:
        value:
          type: string
        label:
          type: string
        info:
          type: string
          nullable: true
      required:
      - value
    PayloadEntry:
      type: object
      properties:
        type:
          type: string
        name:
          type: string
        value:
          type: string
          readOnly: true
          nullable: true
      required:
      - name
      - type
      - value
    PlayerPublic:
      type: object
      properties:
        username:
          type: string
        faction:
          type: object
          properties:
            value:
              enum:
              - ca
              - bi
              - wa
              - cr
              - mo
              - ra
              type: string
              description: |-
                * `ca` - ca
                * `bi` - bi
                * `wa` - wa
                * `cr` - cr
                * `mo` - mo
                * `ra` - ra
            label:
              type: string
              enum:
              - Birds
              - Cats
              - Crows
              - Moles
              - Rats
              - Woodland Alliance
          required:
          - value
          - label
        score:
          type: integer
        turn_order:
          type: integer
        card_count:
          type: integer
          readOnly: true
        active_dominance:
          type: string
          readOnly: true
        crafted_items:
          type: array
          items:
            $ref: '#/components/schemas/CraftedItemEntry'
          readOnly: true
      required:
      - active_dominance
      - card_count
      - crafted_items
      - faction
      - score
      - turn_order
      - username
    ProwessItemEntry:
      type: object
      properties:
        item_id:
          type: integer
        item_type:
          type: string
      required:
      - item_id
      - item_type
    Rats:
      type: object
      description: Serializer to provide all (public) information about rats (Lord
        of the Hundreds).
      properties:
        player:
          $ref: '#/components/schemas/PlayerPublic'
        warriors:
          type: array
          items:
            $ref: '#/components/schemas/Warrior'
        warlord:
          $ref: '#/components/schemas/Warlord'
        strongholds:
          type: array
          items:
            $ref: '#/components/schemas/Stronghold'
        mobs:
          type: array
          items:
            $ref: '#/components/schemas/Mob'
        mood:
          $ref: '#/components/schemas/CurrentMood'
        valid_moods:
          type: array
          items:
            $ref: '#/components/schemas/ValidMoodsEnum'
        command_items:
          type: array
          items:
            $ref: '#/components/schemas/CommandItemEntry'
        prowess_items:
          type: array
          items:
            $ref: '#/components/schemas/ProwessItemEntry'
      required:
      - command_items
      - mobs
      - mood
      - player
      - prowess_items
      - strongholds
      - valid_moods
      - warlord
      - warriors
    Recruiter:
      type: object
      properties:
        building:
          $ref: '#/components/schemas/Building'
        used:
          type: boolean
      required:
      - building
    RevealedCard:
      type: object
      description: Serializer to represent a card revealed through Outrage or Exposure.
      properties:
        card:
          $ref: '#/components/schemas/Card'
        faction:
          type: object
          properties:
            value:
              enum:
              - ca
              - bi
              - wa
              - cr
              - mo
              - ra
              type: string
              description: |-
                * `ca` - ca
                * `bi` - bi
                * `wa` - wa
                * `cr` - cr
                * `mo` - mo
                * `ra` - ra
            label:
              type: string
              enum:
              - Birds
              - Cats
              - Crows
              - Moles
              - Rats
              - Woodland Alliance
          required:
          - value
          - label
        event_type:
          type: string
        turns_ago:
          type: integer
      required:
      - card
      - event_type
      - faction
      - turns_ago
    Roost:
      type: object
      properties:
        building:
          $ref: '#/components/schemas/Building'
        crafted_with:
          type: boolean
      required:
      - building
      - crafted_with
    Sawmill:
      type: object
      properties:
        building:
          $ref: '#/components/schemas/Building'
        used:
          type: boolean
      required:
      - building
    Stronghold:
      type: object
      properties:
        building:
          $ref: '#/components/schemas/Building'
        crafted_with:
          type: boolean
      required:
      - building
    Token:
      type: object
      properties:
        player_name:
          type: string
        clearing_number:
          type: integer
          nullable: true
          readOnly: true
      required:
      - clearing_number
      - player_name
    TokenObtainPair:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - password
      - refresh
      - username
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          writeOnly: true
      required:
      - access
      - refresh
    TypeEnum:
      enum:
      - squire
      - noble
      - lord
      type: string
      description: |-
        * `squire` - Squire
        * `noble` - Noble
        * `lord` - Lord
    UndoResponse:
      type: object
      properties:
        status:
          type: string
      required:
      - status
    ValidMoodsEnum:
      enum:
      - bitter
      - grandiose
      - jubilant
      - lavish
      - relentless
      - rowdy
      - stubborn
      - wrathful
      type: string
      description: |-
        * `bitter` - Bitter
        * `grandiose` - Grandiose
        * `jubilant` - Jubilant
        * `lavish` - Lavish
        * `relentless` - Relentless
        * `rowdy` - Rowdy
        * `stubborn` - Stubborn
        * `wrathful` - Wrathful
    ValidationError:
      type: object
      properties:
        detail:
          description: Error message or object.
      required:
      - detail
    Vizier:
      type: object
      properties:
        column:
          $ref: '#/components/schemas/ColumnEnum'
        fulfilled:
          type: boolean
      required:
      - column
    WA:
      type: object
      description: Serializer to provide all (public) information about wa
      properties:
        player:
          $ref: '#/components/schemas/PlayerPublic'
        tokens:
          $ref: '#/components/schemas/WAToken'
        buildings:
          $ref: '#/components/schemas/WABuilding'
        warriors:
          type: array
          items:
            $ref: '#/components/schemas/Warrior'
        supporter_count:
          type: integer
          readOnly: true
        officer_count:
          type: integer
          readOnly: true
      required:
      - buildings
      - officer_count
      - player
      - supporter_count
      - tokens
      - warriors
    WABase:
      type: object
      properties:
        building:
          allOf:
          - $ref: '#/components/schemas/Building'
