    WAToken:
      type: object
      properties:
        sympathy:
          type: array
          items:
            $ref: '#/components/schemas/WASympathy'
      required:
      - sympathy
    Warlord:
      type: object
      properties:
        clearing_number:
          type: integer
          nullable: true
          readOnly: true
      required:
      - clearing_number
    Warrior:
      type: object
      properties:
        player_name:
          type: string
